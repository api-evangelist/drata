description: Drata Public API v2 rate limits. Specific request-per-minute thresholds are not
  publicly published. Drata returns standard HTTP 429 with retry guidance.
notes: Specific quotas not published in public docs; contact Drata for tenant-specific limits.
sources:
- https://developers.drata.com/openapi/reference/v2/overview/
responseCodes:
  throttled: 429
limits:
- name: Default Public API
  scope: tenant
  metric: requests
  limit: not publicly documented
  notes: HTTP 429 returned on throttling; honor Retry-After header.
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
