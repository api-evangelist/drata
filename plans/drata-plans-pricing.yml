description: Drata does not publish public pricing tiers. Pricing is quote-based and varies by
  framework count, headcount, and integrations.
notes: Pricing is sales-led; no self-serve plan page exists. API access is included with paid
  subscriptions; no separate API plan is published.
sources:
- https://drata.com/pricing
- https://developers.drata.com/
plans:
- id: drata-quote-based
  name: Quote-Based Subscription
  type: enterprise
  description: Annual subscription with pricing scoped to selected frameworks (SOC 2, ISO 27001,
    HIPAA, PCI DSS, GDPR, etc.), employee headcount, and integration count. Contact Drata sales.
  entries:
  - label: Subscription
    name: subscription
    type: flat
    metric: annual subscription
    limit: -1
    timeFrame: yearly
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: API Access (included)
  - name: Custom Connections
  - name: Continuous Monitoring
